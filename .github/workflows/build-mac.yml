name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install HxPKG
        run: haxelib --global install hxpkg

      - name: Restore dependencies via HxPKG
        run: haxelib run hxpkg install

      - name: Install missing haxelibs
        run: |
          haxelib install format || true
          haxelib install hxp || true
          haxelib install hxcpp || true

      - name: Debug haxelib path
        run: |
          find . -maxdepth 4 -type d -name "lime" || true

      - name: Init lime submodules
        run: |
          cd .haxelib/lime/git
          git submodule update --init --recursive

      - name: Rebuild lime tools
        run: haxelib run lime rebuild tools

      - name: Setup lime
        run: haxelib run lime setup -y

      - name: Rebuild lime native libs for macOS
        run: haxelib run lime rebuild mac

      - name: Build for macOS
        run: haxelib run lime build mac -final
        # DLC付きでビルドしたい場合:
        # run: haxelib run lime build mac -final -D DLC

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-impostor-legacy-macos
          path: export/release/macos/bin/*.app
