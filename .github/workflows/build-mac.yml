name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install HxPKG
        run: haxelib --global install hxpkg

      - name: Restore dependencies via HxPKG
        run: haxelib run hxpkg install

      - name: Setup lime
        run: haxelib run lime setup -y

      - name: Build for macOS
        run: haxelib run lime build mac -final

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-impostor-legacy-macos
          path: export/release/macos/bin/*.app
