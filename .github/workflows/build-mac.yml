name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install hmm (Haxe Manager)
        run: haxelib install hmm

      - name: Restore haxelib dependencies via hmm
        run: haxelib run hmm install

      - name: Setup lime/openfl targets
        run: |
          haxelib run lime setup -y flixel
          haxelib run lime setup -y flixel-ui || true

      - name: Build for macOS
        run: haxelib run lime build mac -final

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-impostor-legacy-macos
          path: export/release/macos/bin/*.app
