name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install HxPKG
        run: haxelib --global install hxpkg

      - name: Restore dependencies via HxPKG
        run: haxelib run hxpkg install

      - name: Install lime tool dependencies
        run: |
          haxelib install format || true
          haxelib install svg || true
          haxelib install hxp || true
          haxelib install actuate || true

      - name: Init lime submodules
        run: |
          cd .haxelib/lime/git
          git submodule update --init --recursive

      - name: Rebuild lime native binary (mac)
        run: haxelib run lime rebuild mac

      - name: Rebuild lime tools
        run: haxelib run lime rebuild tools

      - name: List built ndlls (debug)
        run: find .haxelib/lime/git/ndll -type f || echo "ndll folder not found"

      - name: Setup lime
        run: haxelib run lime setup -y

      - name: Build for macOS
        run: haxelib run lime build mac -final

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-impostor-legacy-macos
          path: export/release/macos/bin/*.app
