name: Build Mac
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # Hxvlcのビルド dependenciesの関係上、MacアプリはMac環境でビルドする必要があります
    runs-on: macos-13 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # READMEの指示：Haxe 4.3.6 以降が必要
      - name: Setup Haxe
        uses: haxe-action/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      # READMEの指示：hxpkgを使って期待されるバージョンを強制インストール
      - name: Install Dependencies via hxpkg
        run: |
          haxelib install hxpkg
          haxelib run hxpkg setup
          haxelib run hxpkg install

      # READMEの指示：lime test cpp (または build mac) でビルド
      - name: Build Game for Mac
        run: |
          haxelib run lime build mac -release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImpostorLegacy-Mac
          path: export/release/macos/bin/
